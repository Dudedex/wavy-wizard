<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wavy Wizard Spell Preview</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: radial-gradient(circle at 50% 15%, #201632, #070a12 70%); color: #eaf2ff; font: 14px/1.4 system-ui, sans-serif; }
    header { padding: 18px 24px 8px; } h1 { margin: 0 0 4px; font-size: 22px; } p { margin: 0; color: #9fb0c8; }
    canvas { display: block; width: min(1180px, calc(100vw - 32px)); height: auto; margin: 16px auto 24px; border: 1px solid rgba(196,123,255,.28); border-radius: 16px; background: rgba(6,10,18,.72); box-shadow: 0 18px 60px rgba(0,0,0,.45); }
    nav { padding: 0 24px; } a { color: #8be0ff; }
  </style>
</head>
<body>
  <header>
    <h1>Spell Asset Preview</h1>
    <p>Spell icons, projectile trails, cores, tier halos, cone wedges, and nova rings represented in one animated grid.</p>
  </header>
  <nav><a href="asset-previews.html">All previews</a></nav>
  <canvas id="preview" width="1180" height="760" aria-label="Spell asset preview grid"></canvas>
  <script src="js/data/spells.js"></script>
  <script>
    'use strict';
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    const ids = Object.keys(SPELLS);
    const start = performance.now();
    function hexA(hex, alpha) { const n = parseInt(hex.slice(1), 16); return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${alpha})`; }
    function drawProjectile(def, kind, x, y, t, tier) {
      const r = kind === 'fireball' ? 10 : kind === 'frost' ? 7 : 6;
      const ang = Math.sin(t * 0.8) * 0.35;
      const pulse = 0.5 + Math.sin(t * 8) * 0.5;
      ctx.save(); ctx.translate(x, y); ctx.rotate(ang); ctx.globalCompositeOperation = 'lighter';
      const tail = 38;
      const grad = ctx.createLinearGradient(-tail, 0, r, 0);
      grad.addColorStop(0, hexA(def.color, 0)); grad.addColorStop(.55, hexA(def.color, .42)); grad.addColorStop(1, hexA(def.color, .9));
      ctx.fillStyle = grad; ctx.beginPath(); ctx.ellipse(-tail * .35, 0, tail * .7, r * (kind === 'frost' ? .45 : .75), 0, 0, Math.PI * 2); ctx.fill();
      if (kind === 'frost') { ctx.strokeStyle = 'rgba(230,250,255,.85)'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(-r * 1.6,0); ctx.lineTo(r * 1.5,0); ctx.moveTo(0,-r); ctx.lineTo(r * 1.3,0); ctx.lineTo(0,r); ctx.stroke(); }
      if (kind === 'fireball') { ctx.fillStyle = 'rgba(255,225,110,.45)'; ctx.beginPath(); ctx.arc(-r * .25, 0, r * (.6 + pulse * .25), 0, Math.PI * 2); ctx.fill(); }
      if (tier >= 3) { ctx.strokeStyle = 'rgba(255,212,84,.9)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, r + 4 + pulse * 2, 0, Math.PI * 2); ctx.stroke(); }
      ctx.shadowColor = def.color; ctx.shadowBlur = tier >= 2 ? 18 : 10; ctx.fillStyle = def.color; ctx.beginPath(); ctx.arc(0, 0, r + (tier >= 2 ? 1.5 : 0), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(-r * .25, -r * .25, r * .42, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    function draw(time) {
      const t = (time - start) / 1000;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const cols = 5, cellW = canvas.width / cols, cellH = 178;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ids.forEach((id, i) => {
        const def = SPELLS[id], col = i % cols, row = Math.floor(i / cols);
        const x = cellW * col + cellW / 2, y = 82 + row * cellH;
        ctx.save(); ctx.fillStyle = 'rgba(196,123,255,.08)'; ctx.strokeStyle = 'rgba(196,123,255,.16)'; ctx.beginPath(); ctx.roundRect(cellW * col + 14, row * cellH + 18, cellW - 28, cellH - 30, 14); ctx.fill(); ctx.stroke(); ctx.restore();
        const tier = (i % 4) + 1;
        if (def.breath) {
          ctx.save(); ctx.translate(x - 28, y); ctx.rotate(Math.sin(t + i) * .35); const grad = ctx.createLinearGradient(0,0,72,0); grad.addColorStop(0, hexA(def.color,.85)); grad.addColorStop(1, hexA(def.color,0)); ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,78,-.48,.48); ctx.closePath(); ctx.fill(); ctx.restore();
        } else if (id === 'nova' || id === 'shield') {
          ctx.strokeStyle = def.color; ctx.lineWidth = 4; ctx.globalAlpha = .75; ctx.beginPath(); ctx.arc(x, y, 22 + Math.sin(t * 4) * 8, 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1;
        } else if (id === 'orbs') {
          for (let k = 0; k < 4; k++) { const a = t * 1.5 + k * Math.PI / 2; drawProjectile(def, 'orb', x + Math.cos(a) * 32, y + Math.sin(a) * 22, t + k, tier); }
        } else {
          drawProjectile(def, id === 'fireball' || id === 'meteor' ? 'fireball' : id === 'frost' ? 'frost' : 'missile', x, y, t + i, tier);
        }
        ctx.font = '26px sans-serif'; ctx.fillStyle = '#fff'; ctx.fillText(def.icon, x - 46, y - 36);
        ctx.fillStyle = '#eaf2ff'; ctx.font = 'bold 15px system-ui, sans-serif'; ctx.fillText(def.name, x, y + 58);
        ctx.fillStyle = '#9fb0c8'; ctx.font = '12px system-ui, sans-serif'; ctx.fillText(id, x, y + 78);
      });
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
